apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-shortener-ingress
  namespace: url-shortener
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-west-2:703844615264:certificate/c8820136-1ef5-4542-8870-e58fbac1a304
    alb.ingress.kubernetes.io/ssl-redirect: '443'
spec:
  rules:
    - http:
        paths:
          - path: /shorten
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8080
          - path: /stats
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8080
          - path: /summary
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081
          - path: /recent
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081
          - path: /top
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081
          - path: /url
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8080