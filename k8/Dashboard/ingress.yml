apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: url-shortener-ingress
  namespace: url-shortener
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - url-shortener-aws.co.uk
      secretName: url-shortener-tls
  rules:
    - http:
        paths:
          - path: /summary
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081
          - path: /recent
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081
          - path: /top
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081
          - path: /url
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081
          - path: /healthz
            pathType: Prefix
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8081